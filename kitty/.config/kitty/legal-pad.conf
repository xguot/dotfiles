# Color scheme — Legal Pad
# A mathematically optimized, perfectly isoluminant analog workspace. 
# Background L* 99 tamed by uniform L* 50 foreground inks.

foreground #66737C
background #FFFFEA

# Acme's classic hardcoded selection color 
selection_foreground #000000
selection_background #EEEE9E

# Signature desaturated cyan cursor (provides the only luminous visual anchor)
cursor #6CBDF5
cursor_text_color #000000

# Standard 16 ANSI Colors
# Recalculated using CIELAB color space. All normal colors share an exact L* of 50.
# All bright colors share an exact L* of 60. This guarantees zero visual vibration.

# Black (Primary ink and structural gray)
color0  #66737C
color8  #7F8C94

# Red (Dusty brick ink for deletions)
color1  #BA5E5A
color9  #D17571

# Green (Muted kelp ink for additions)
color2  #5C7E5A
color10 #729670

# Yellow (Darkened to olive-mustard to ensure contrast against the yellow paper)
color3  #8F7343
color11 #A88B5A

# Blue (Desaturated steel blue ink)
color4  #59779E
color12 #718FBA

# Magenta (Subtle plum ink, severely desaturated)
color5  #926388
color13 #AB7BA1

# Cyan (Dusty teal ink to complement but not compete with the cursor)
color6  #487E87
color14 #5E96A0

# White (Structural foreground tones — dark rather than white for light themes)
color7  #5C6870
color15 #3F4950
