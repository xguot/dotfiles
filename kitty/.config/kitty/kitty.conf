# FONT & WINDOW
# Unpatched — kitty renders symbols natively (no Nerd Font needed).
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Window layout
remember_window_size  no
initial_window_width  1000
initial_window_height 650
window_padding_width  8

# BEHAVIOR & INTEGRATION
# Send the CSI u escape sequence for Super+Enter
map cmd+enter send_text all \x1b[13;9u

# Shell integration — keep features but prevent cursor shape changes
shell_integration enabled no-cursor

# Terminal bell
enable_audio_bell no

# Keyboard shortcuts
map ctrl+shift+h show_scrollback

# SCROLLBACK PAGER (Tuned to Legal Pad)
scrollback_lines 10000
scrollback_pager sh -c "sed -e 's/\\x1b\\[[0-9;:]*[a-zA-Z]//g' -e 's/\\x1b\\]133;[A-Z]\\x1b\\\\//g' | vim -N -u NONE -c 'set termguicolors' -c 'set laststatus=0 clipboard=unnamed number relativenumber nowrap nolist showtabline=0 foldcolumn=0 signcolumn=no hlsearch incsearch ignorecase smartcase' -c 'hi Normal guibg=NONE guifg=#66737C | hi LineNr guibg=NONE guifg=#7F8C94 | hi Visual guibg=#D4E6F8 guifg=#000000 gui=NONE | hi Search guibg=#D4E6F8 guifg=#000000 gui=NONE | hi IncSearch guibg=#6CBDF5 guifg=#000000 gui=bold' -c 'silent! unmap q' -c 'nnoremap q :qa!<CR>' -c 'vnoremap q :qa!<CR> | xnoremap q :qa!<CR>' -"

# COLOR SCHEME: LEGAL PAD
# A mathematically optimized, perfectly isoluminant analog workspace. 
# Background L* 99 tamed by uniform L* 50 foreground inks.
term xterm-256color

foreground #66737C
background #FFFFEA

# Ice-blue selection color
selection_foreground #000000
selection_background #D4E6F8

# Cursor customization
cursor_shape block
cursor_blink_interval 0
cursor #6CBDF5
cursor_text_color #000000

# Standard 16 ANSI Colors
# Black (Primary ink and structural gray)
color0  #66737C
color8  #7F8C94

# Red (Dusty brick ink for deletions)
color1  #BA5E5A
color9  #D17571

# Green (Muted kelp ink for additions)
color2  #5C7E5A
color10 #729670

# Yellow (Darkened to olive-mustard to ensure contrast against the yellow paper)
color3  #8F7343
color11 #A88B5A

# Blue (Desaturated steel blue ink)
color4  #59779E
color12 #718FBA

# Magenta (Subtle plum ink, severely desaturated)
color5  #926388
color13 #AB7BA1

# Cyan (Dusty teal ink to complement but not compete with the cursor)
color6  #487E87
color14 #5E96A0

# White (Structural foreground tones — dark rather than white for light themes)
color7  #5C6870
color15 #3F4950
