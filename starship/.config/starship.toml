add_newline = true

format = "$all"

[directory]
style = "bold white"
truncate_to_repo = false
truncation_length = 8

[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"

[git_branch]
style = "bold blue"
format = "[$branch]($style) "

[git_status]
style = "green"
format = '([\[$all_status$ahead_behind\]]($style) )'
